name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check types, tests, and production build
        run: npm run check

      - name: Install virtual display
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes xvfb

      - name: Smoke test Electron (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npm run smoke:built

      - name: Smoke test Electron
        if: runner.os != 'Linux'
        run: npm run smoke:built

      - name: Package application
        run: npm run pack
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
